<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aText Shortcut Example Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .section-title {
            font-size: 1.3em;
            color: #495057;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .file-upload-btn:hover {
            background: #5568d3;
        }

        .file-name {
            margin-top: 10px;
            color: #28a745;
            font-weight: 600;
        }

        .btn {
            padding: 14px 35px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .shortcuts-list {
            max-height: 300px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .shortcut-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .shortcut-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .shortcut-item.selected {
            background: #d4d9ff;
            border-left-color: #764ba2;
        }

        .shortcut-abbr {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }

        .shortcut-phrase {
            color: #495057;
        }

        .examples-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #dc3545;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #28a745;
        }

        .count-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .count-btn {
            padding: 10px 20px;
            background: #e9ecef;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .count-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .count-btn:hover {
            border-color: #667eea;
        }

        .file-details {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            display: none;
        }

        .file-details.show {
            display: block;
        }

        .file-item {
            padding: 8px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item.success {
            border-left: 4px solid #28a745;
        }

        .file-item.error {
            border-left: 4px solid #dc3545;
        }

        .info-text {
            color: #6c757d;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .btn-test {
            background: #17a2b8;
            margin-left: 10px;
        }

        .btn-test:hover {
            background: #138496;
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.4);
        }

        .api-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .api-status.show {
            display: block;
        }

        .api-status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .api-status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .selection-info {
            margin-top: 15px;
            padding: 12px;
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            display: none;
        }

        .selection-info.show {
            display: block;
        }

        .selection-info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 aText Shortcut Example Generator</h1>
        <p class="subtitle">aText 단축어 파일을 업로드하고 영어 예문을 생성하세요</p>

        <!-- Section 1: Claude API Key -->
        <div class="section">
            <div class="section-title">
                <span class="section-number">1</span>
                Claude API Key 설정
            </div>
            <div class="input-group">
                <label for="apiKey">Claude API Key</label>
                <input type="text" id="apiKey" placeholder="sk-ant-api03-..." />
            </div>
            <button class="btn btn-test" id="testApiKeyBtn">🔍 API Key 테스트</button>
            <div id="apiStatus" class="api-status"></div>
        </div>

        <!-- Section 2: File Upload -->
        <div class="section">
            <div class="section-title">
                <span class="section-number">2</span>
                aText 파일 업로드 (여러 파일 선택 가능)
            </div>
            <label for="fileInput" class="file-upload-btn">📁 파일 선택 (다중 선택 가능)</label>
            <input type="file" id="fileInput" accept=".atext,.plist,.json,.csv,.txt" multiple />
            <div id="fileName" class="file-name"></div>
            <div id="fileDetails" class="file-details"></div>
            <div id="shortcutsList" class="shortcuts-list" style="display: none;"></div>
        </div>

        <!-- Section 3: Example Count -->
        <div class="section">
            <div class="section-title">
                <span class="section-number">3</span>
                예문 개수 선택
            </div>
            <div class="count-selector">
                <div class="count-btn active" data-count="3">3개</div>
                <div class="count-btn" data-count="5">5개</div>
                <div class="count-btn" data-count="7">7개</div>
            </div>
        </div>

        <!-- Section 4: Generate -->
        <div class="section">
            <div class="section-title">
                <span class="section-number">4</span>
                예문 생성
            </div>
            <div class="selection-info" id="selectionInfo">
                <strong>선택된 단축어:</strong> <span id="selectedCount">0</span>개
            </div>
            <button class="btn" id="generateBtn" disabled>✨ 선택한 단축어 예문 생성하기</button>
            <div id="examplesContainer"></div>
        </div>

        <!-- Section 5: Email -->
        <div class="section">
            <div class="section-title">
                <span class="section-number">5</span>
                이메일 전송
            </div>
            <div class="input-group">
                <label for="emailInput">받는 사람 이메일</label>
                <input type="email" id="emailInput" placeholder="example@email.com" />
            </div>
            <button class="btn btn-success" id="sendEmailBtn" disabled>📧 이메일 전송</button>
            <div id="emailStatus"></div>
        </div>
    </div>

    <script>
        let shortcuts = [];
        let selectedShortcuts = new Set(); // Changed to Set for multiple selection
        let selectedCount = 3;
        let generatedExamples = '';

        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const fileDetails = document.getElementById('fileDetails');
        const shortcutsList = document.getElementById('shortcutsList');
        const generateBtn = document.getElementById('generateBtn');
        const sendEmailBtn = document.getElementById('sendEmailBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const emailInput = document.getElementById('emailInput');
        const examplesContainer = document.getElementById('examplesContainer');
        const emailStatus = document.getElementById('emailStatus');
        const testApiKeyBtn = document.getElementById('testApiKeyBtn');
        const apiStatus = document.getElementById('apiStatus');
        const selectionInfo = document.getElementById('selectionInfo');
        const selectedCountSpan = document.getElementById('selectedCount');

        // API Key Test
        testApiKeyBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('API Key를 입력해주세요.');
                return;
            }

            testApiKeyBtn.disabled = true;
            testApiKeyBtn.textContent = '🔍 테스트 중...';
            apiStatus.style.display = 'none';

            try {
                const response = await fetch('/api/test-api-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ claudeApiKey: apiKey })
                });

                const data = await response.json();

                if (data.success) {
                    apiStatus.className = 'api-status success show';
                    apiStatus.innerHTML = `✅ ${data.message}<br><small>Model: ${data.model}</small>`;
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                apiStatus.className = 'api-status error show';
                apiStatus.textContent = `❌ ${error.message}`;
            } finally {
                testApiKeyBtn.disabled = false;
                testApiKeyBtn.textContent = '🔍 API Key 테스트';
            }
        });

        // Count selector
        document.querySelectorAll('.count-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCount = parseInt(btn.dataset.count);
            });
        });

        // File upload - Multiple files support
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            fileName.textContent = `업로드 중... ${files.length}개 파일 처리 중`;
            fileName.style.color = '#667eea';
            fileDetails.style.display = 'none';

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    shortcuts = data.shortcuts;
                    fileName.textContent = `✅ ${files.length}개 파일 업로드 완료 (총 ${data.count}개의 단축어 발견)`;
                    fileName.style.color = '#28a745';
                    
                    // Show file processing details
                    if (data.filesProcessed && data.filesProcessed.length > 0) {
                        fileDetails.innerHTML = '<strong>파일 처리 결과:</strong><br>' +
                            data.filesProcessed.map(file => `
                                <div class="file-item ${file.success ? 'success' : 'error'}">
                                    <span>${file.filename}</span>
                                    <span>${file.success ? `✅ ${file.count}개` : `❌ ${file.error}`}</span>
                                </div>
                            `).join('');
                        fileDetails.classList.add('show');
                    }
                    
                    displayShortcuts();
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                fileName.textContent = `❌ 업로드 실패: ${error.message}`;
                fileName.style.color = '#dc3545';
                fileDetails.style.display = 'none';
            }
        });

        function displayShortcuts() {
            if (shortcuts.length === 0) {
                shortcutsList.style.display = 'none';
                return;
            }

            shortcutsList.style.display = 'block';
            shortcutsList.innerHTML = '<strong>단축어를 선택하세요 (클릭으로 다중 선택 가능):</strong><br><br>' + 
                shortcuts.map((s, index) => `
                    <div class="shortcut-item" data-index="${index}">
                        <span class="shortcut-abbr">${s.abbreviation}</span>
                        <span class="shortcut-phrase">${s.fullExpression}</span>
                    </div>
                `).join('');

            // Add click handlers for multiple selection
            document.querySelectorAll('.shortcut-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    
                    if (selectedShortcuts.has(index)) {
                        // Deselect
                        selectedShortcuts.delete(index);
                        item.classList.remove('selected');
                    } else {
                        // Select
                        selectedShortcuts.add(index);
                        item.classList.add('selected');
                    }
                    
                    updateGenerateButton();
                    updateSelectionInfo();
                });
            });
        }

        function updateSelectionInfo() {
            selectedCountSpan.textContent = selectedShortcuts.size;
            if (selectedShortcuts.size > 0) {
                selectionInfo.classList.add('show');
            } else {
                selectionInfo.classList.remove('show');
            }
        }

        function updateGenerateButton() {
            const apiKey = apiKeyInput.value.trim();
            generateBtn.disabled = !(selectedShortcuts.size > 0 && apiKey);
        }

        apiKeyInput.addEventListener('input', updateGenerateButton);

        // Generate examples
        generateBtn.addEventListener('click', async () => {
            if (selectedShortcuts.size === 0) {
                alert('단축어를 선택해주세요.');
                return;
            }

            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('Claude API Key를 입력해주세요.');
                return;
            }

            examplesContainer.innerHTML = '<div class="loading">⏳ 예문 생성 중... (선택된 ' + selectedShortcuts.size + '개 단축어)</div>';
            generateBtn.disabled = true;

            try {
                // Get selected expressions
                const selectedExpressions = Array.from(selectedShortcuts).map(index => 
                    shortcuts[index].fullExpression
                );

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fullExpressions: selectedExpressions,
                        count: selectedCount,
                        claudeApiKey: apiKey
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Build combined examples output
                    let combinedOutput = '';
                    
                    data.results.forEach((result, index) => {
                        if (result.success) {
                            combinedOutput += `\n\n${'='.repeat(60)}\n`;
                            combinedOutput += `단축어 ${index + 1}: ${result.fullExpression}\n`;
                            combinedOutput += `${'='.repeat(60)}\n\n`;
                            combinedOutput += result.examples;
                        } else {
                            combinedOutput += `\n\n❌ ${result.fullExpression}: ${result.error}\n`;
                        }
                    });

                    generatedExamples = combinedOutput;
                    
                    examplesContainer.innerHTML = `
                        <div class="success">✅ ${data.totalProcessed}개 단축어 예문 생성 완료!</div>
                        <div class="examples-container">${combinedOutput}</div>
                    `;
                    sendEmailBtn.disabled = false;
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                examplesContainer.innerHTML = `<div class="error">❌ 예문 생성 실패: ${error.message}</div>`;
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Send email
        sendEmailBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                alert('이메일 주소를 입력해주세요.');
                return;
            }

            if (!generatedExamples) {
                alert('먼저 예문을 생성해주세요.');
                return;
            }

            emailStatus.innerHTML = '<div class="loading">📧 이메일 전송 중...</div>';
            sendEmailBtn.disabled = true;

            try {
                // Get selected shortcuts info
                const selectedInfo = Array.from(selectedShortcuts).map(index => ({
                    abbr: shortcuts[index].abbreviation,
                    expr: shortcuts[index].fullExpression
                }));

                const subjectLine = selectedInfo.length === 1 
                    ? `English Examples for "${selectedInfo[0].expr}"`
                    : `English Examples for ${selectedInfo.length} Shortcuts`;

                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        subject: subjectLine,
                        body: generatedExamples
                    })
                });

                const data = await response.json();

                if (data.success) {
                    emailStatus.innerHTML = `<div class="success">✅ 이메일이 성공적으로 전송되었습니다!</div>`;
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                emailStatus.innerHTML = `<div class="error">❌ 이메일 전송 실패: ${error.message}</div>`;
            } finally {
                sendEmailBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
